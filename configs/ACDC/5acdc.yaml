# arguments for dataset, AK-1K needed padding
dataset: ACDC
nclass: 5 
labelnum: 50 # 50 for 1:16; 80 for 1:10; 160 for 1:5
crop_size: [64, 128, 128]
val_patch_size: [64, 128, 128]

# arguments for training
epochs: 200
batch_size: 4   # must be even because of the cutmix!
lr: 0.1
criterion:
  name: CELoss
  kwargs:
    ignore_index: 255
conf_thresh: 0.95


# arguments for model
model: unet_3d
backbone: cnn
baseline: unet
lock_backbone: False